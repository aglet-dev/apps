name: Validate

on:
  pull_request:
    paths:
      - "**/*.json"
      - "**/scripts.js"
      - "**/ui.tsx"
      - "**/locales/**"
      - "**/screenshots/**"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed aglets
        id: changes
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          if [ "$base" = "0000000000000000000000000000000000000000" ] || [ -z "$base" ]; then
            apps=$(for d in */; do
              id="${d%/}"
              [ -f "$id/aglet.json" ] && echo "$id"
            done | sort -u)
          else
            apps=$(git diff --name-only "$base" "$head" \
              | awk -F/ 'NF>=2 && $1!=".github" { print $1 }' \
              | sort -u \
              | while read d; do [ -f "$d/aglet.json" ] && echo "$d"; done)
          fi
          if [ -z "$apps" ]; then
            echo "apps=" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "apps<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' $apps >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Install
        if: steps.changes.outputs.apps != ''
        run: |
          brew tap agent-rt/tap
          brew install agent-rt/tap/aglet

      - name: Validate
        if: steps.changes.outputs.apps != ''
        env:
          APPS: ${{ steps.changes.outputs.apps }}
        run: |
          set -euo pipefail
          fail=0
          for id in $APPS; do
            echo "::group::$id"
            manifest="$id/aglet.json"
            aglet validate "$manifest" || { fail=1; echo "✗ $id validate"; }
            aglet publish "$manifest" --dry-run --no-git --no-push --no-pr \
              || { fail=1; echo "✗ $id pack"; }
            echo "::endgroup::"
          done
          exit $fail
